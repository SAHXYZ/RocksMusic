start_2: "✦✧ Hᴇʏ {0},\nғʀᴇǫᴜᴇɴᴄʏ ᴜᴘʟɪғᴛ ᴅᴇᴛᴇᴄᴛᴇᴅ → ʏσᴜ’ʀᴇ ɴᴏᴡ ᴛᴜɴᴇᴅ ɪɴ.\n\n{1},\nᴀη ᴀɪ-ғᴏʀᴍᴇᴅ sᴏᴜηᴅ ᴇηɢɪηᴇ ʙᴜɪʟᴛ ғᴏʀ ᴘᴜʀᴇ, ᴄʟᴇᴀη, ᴘᴏᴡᴇʀ ғʟᴏᴡ.\n❖ ᴅʀᴏᴘ ᴀ ᴛʀᴀᴄᴋ • ʟᴇᴛ ᴍᴇ ᴛᴜʀη ɪᴛ ɪηᴛᴏ ᴠɪʙᴇs ɪη sᴇᴄᴏηᴅs.\n\n✦ Rᴏᴄᴋs Oғғɪᴄɪᴀʟ ᴅᴏєsη’ᴛ ᴄʜᴀsᴇ ᴄʜᴀᴏs →\nɪᴛ sᴇᴛs ᴛʜᴇ sᴛᴀηᴅᴀʀᴅ.\n\n✧ ᴡᴧᴛᴄʜᴇʀs ᴡᴀᴛᴄʜ • sɴᴧᴋᴇs ꜱʟɪᴘ • ᴄᴏᴘʏᴄᴧᴛꜱ ꜰᴏʟʟᴏᴡ ↬\nʙᴜᴛ ᴛʜᴇ ᴀᴜᴛʜᴇηᴛɪᴄ ᴠɪʙᴇ ᴘɪᴄᴋꜱ ɪᴛꜱ ᴏᴡη ᴘᴇᴏᴘʟᴇ.\n\n❂ ғʟᴏᴡ ᴄʜᴇᴄᴋɪηɢ? ᴠᴀʟɪᴅ.\n❂ ᴀᴅᴅɪηɢ ᴍᴇ? ᴛʜᴀᴛ’ꜱ ᴀ ηᴇᴡ ꜰʀᴇǫᴜᴇηᴄʏ ʟᴇᴠᴇʟ.\n\n✦ sʏsᴛᴇᴍ ᴏηʟɪηᴇ • ᴠɪʙᴇ ᴇηᴇʀɢɪᴢᴇᴅ.\n\n⎯⎯⎯⧉ Cʜᴇᴄᴋᴏᴜᴛ ɪɢ ⎯⎯⎯\n<blockquote><a href=\"https://www.instagram.com/rocks_official_empire\">𖤐 Rᴏᴄᴋꜱ 𝕏 Eᴍᴘɪʀᴇ</a></blockquote>\n\n⎯⎯⎯⧉ Pᴏᴡᴇʀᴇᴅ ʙʏ ⎯⎯⎯\n<blockquote><a href=\"https://t.me/ROCKS_OFFICIAL\">𖤐 Rᴏᴄᴋꜱ 𝕏 Eᴍᴘɪʀᴇ</a></blockquote>"

